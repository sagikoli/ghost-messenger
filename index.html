        // =========================================================================
        // 1. CRYPTO HELPERS (Client-side end-to-end AES-GCM encryption)
        // =========================================================================
        function bufferToBase64(buf) {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
        }

        function base64ToBuffer(base64) {
            const binstr = atob(base64);
            const buf = new Uint8Array(binstr.length);
            for (let i = 0; i < binstr.length; i++) {
                buf[i] = binstr.charCodeAt(i);
            }
            return buf.buffer;
        }

        async function generateCryptoKey() {
            return await window.crypto.subtle.generateKey(
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function exportKeyToBase64(key) {
            const exported = await window.crypto.subtle.exportKey("jwk", key);
            return btoa(JSON.stringify(exported))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        async function importKeyFromBase64(base64Url) {
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) {
                base64 += '=';
            }
            const jwk = JSON.parse(atob(base64));
            return await window.crypto.subtle.importKey(
                "jwk",
                jwk,
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptText(text, key) {
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encoder = new TextEncoder();
            const ciphertext = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                key,
                encoder.encode(text)
            );
            return {
                ciphertext: bufferToBase64(ciphertext),
                iv: bufferToBase64(iv)
            };
        }

        async function decryptText(ciphertextBase64, ivBase64, key) {
            try {
                const ciphertext = base64ToBuffer(ciphertextBase64);
                const iv = base64ToBuffer(ivBase64);
                const decoder = new TextDecoder();
                const decrypted = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    ciphertext
                );
                return decoder.decode(decrypted);
            } catch (e) {
                return "[Error Decrypting Message - Invalid Key]";
            }
        }

            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // Sound 1: Bright trigger chime
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc1.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12); // Up to A5
                gain1.gain.setValueAtTime(0.08, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                
                osc1.start();
                osc1.stop(ctx.currentTime + 0.25);
            } catch (err) {
                console.warn("Audio Context blocked by browser interaction rules", err);
            }

        // =========================================================================

        function GhostChatApp() {

                            .limitToLast(MAX_RENDERED_MESSAGES)
                            .onSnapshot(async (snapshot) => {
                                const fetchedMsgs = [];
                                for (const doc of snapshot.docs) {
                                    const data = doc.data();
                                            const expiresAtMs = normalizeExpiresAt(data.expiresAt);
                                if (expiresAtMs && expiresAtMs < Date.now()) {
                                    db.collection("rooms").doc(roomID).collection("messages").doc(doc.id).delete();
                                    continue;
                                }

                                const decryptedText = await decryptText(data.ciphertext, data.iv, cryptoKey);
                                fetchedMsgs.push({
                                    id: doc.id,
                                    content: decryptedText,
                                    senderId: data.senderId,
                                    senderName: data.senderName,
                                    createdAt: data.createdAt?.seconds ? data.createdAt.seconds * 1000 : Date.now(),
                                    expiresAt: expiresAtMs
                                });
                                }

                                if (fetchedMsgs.length > 0) {
                                    const lastMsg = fetchedMsgs[fetchedMsgs.length - 1];
                                    if (lastMsg && lastMsg.senderId !== myUserId && soundEnabledRef.current) {
                                        playNotificationSound();
                                    }
                                }

                                // Visible messages are already limited by the query.
                                setArchivedMessages([]);
                                setMessages(fetchedMsgs);

                                // Track earliest visible message timestamp for server-side pagination
                                earliestMessageRef.current = fetchedMsgs[0]?.createdAt || null;

                                // Determine whether there are older messages on the server
                                if (earliestMessageRef.current) {
                                    const earliestTs = firebase.firestore.Timestamp.fromMillis(earliestMessageRef.current);
                                    db.collection("rooms").doc(roomID).collection("messages")
                                        .orderBy("createdAt", "asc")
                                        .endBefore(earliestTs)
                                        .limit(1)
                                        .get()
                                        .then(checkSnap => {
                                            hasMoreOlderRef.current = (checkSnap && checkSnap.size > 0);
                                        })
                                        .catch(() => { hasMoreOlderRef.current = false; });
                                } else {

                            if (!loadingOlderRef.current && hasMoreOlderRef.current && earliestMessageRef.current) {

                                const previousHeight = container.scrollHeight;
                                const previousScrollTop = container.scrollTop;

                                try {
                                    const earliestTs = firebase.firestore.Timestamp.fromMillis(earliestMessageRef.current);

                                        .orderBy("createdAt", "asc")

                    img.onload = () => {

                        let height = img.height;

                        if (width <= maxDimension && height <= maxDimension) {
                            resolve(rawDataUrl);
                            return;
                        }

                        const ratio = maxDimension / Math.max(width, height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);

                        canvas.width = width;
                        canvas.height = height;

                } catch (err) {
                    alert("Invalid JSON. Please paste the Firebase web app config object exactly.");
                    console.error("Failed to parse Firebase config JSON:", err);
                }
            };

            // Apply newly initialized theme to physical body
            useEffect(() => {
                document.body.className = `${currentTheme.bg} ${currentTheme.textColor || 'text-gray-100'} flex items-center justify-center transition-all duration-300`;
                const rootContainer = document.getElementById('root');
                if (rootContainer) {
                    rootContainer.className = `w-full h-full max-w-md ${currentTheme.bg} md:rounded-2xl md:shadow-2xl md:border ${currentTheme.border} md:h-[90vh] md:max-h-[850px] relative overflow-hidden flex flex-col transition-all duration-300`;
                }
            }, [themeKey]);

            // Keep settings open until a valid Firebase config is present
            useEffect(() => {
                if (!firebaseConfig) {
                    setShowSettings(true);
                }
            }, [firebaseConfig]);

            // Keep settings open until a valid Firebase config is present
            useEffect(() => {
                if (!firebaseConfig) {
                    setShowSettings(true);
                }
            }, [firebaseConfig]);

            // No external DOM icon injection; icons are rendered via React-safe SVGs
            useEffect(() => {
                // This effect is intentionally empty to preserve React DOM stability.
            }, [isCreated, showSettings, copied, soundEnabled, themeKey, isJoiningWithLink]);

            // =========================================================================
            // RENDERING PHASE
            // =========================================================================

            // SCREEN A: LANDING PAGE / ROOM CREATION / JOIN REQUEST
            if (!isCreated) {
                return (
                    <div className="flex-1 flex flex-col justify-between p-6">
                        {/* Header Branding */}
                        <div className="text-center mt-6">
                            <div className={`mx-auto w-16 h-16 ${currentTheme.messageSelfBg} rounded-2xl flex items-center justify-center shadow-lg mb-4 transition-all duration-300`}>
                                <Icon name="shield-alert" className={`w-8 h-8 ${currentTheme.isLight ? 'text-slate-900' : 'text-white'}`} />
                            </div>
                            <h1 className="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-purple-200 to-gray-400 bg-clip-text text-transparent">GhostChat</h1>
                            <p className="text-xs text-gray-400 mt-2 tracking-wide uppercase font-semibold">Zero accounts. Total Privacy.</p>
                        </div>

                        {/* Setup Body */}
                        <div className="my-auto space-y-5">
                            <div className={`${currentTheme.cardBg} p-4 rounded-xl space-y-3 transition-all duration-300`}>
                                <h3 className={`text-sm font-semibold ${currentTheme.textAccent} flex items-center gap-2`}>
                                    <Icon name="lock" className={`w-4 h-4 ${currentTheme.isLight ? 'text-slate-700' : 'text-gray-400'}`} /> End-To-End Encrypted
                                </h3>
                                <p className={`text-xs leading-relaxed ${currentTheme.isLight ? 'text-slate-600' : 'text-gray-400'}`}>
                                    A cryptographic key is generated inside your browser and appended to the URL hash. Because hash data stays client-side, <span className={`${currentTheme.isLight ? 'text-slate-700 font-semibold' : 'text-gray-300 font-semibold'}`}>no server can ever read your messages</span>.
                                </p>
                            </div>

                            <form onSubmit={handleStartSession} className="space-y-4">
                                <div>
                                    <label className={`block text-xs font-bold uppercase tracking-wider ${currentTheme.textAccent} mb-2`}>Your Display Name</label>
                                    <input 
                                        type="text" 
                                        required
                                        maxLength="12"
                                        placeholder="e.g. Alice" 
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        className={`w-full ${currentTheme.inputBg} rounded-xl px-4 py-3.5 ${currentTheme.isLight ? 'text-slate-900 placeholder-slate-500' : 'text-white placeholder-gray-500'} focus:outline-none focus:ring-2 transition-all text-sm font-medium`}
                                    />
                                </div>

                                <button 
                                    type="submit" 
                                    className={`w-full ${currentTheme.accentBg} active:transform active:scale-98 text-white rounded-xl py-4 font-bold text-sm tracking-wide transition-all flex items-center justify-center gap-2 cursor-pointer`}
                                >
                                    <Icon name={isJoiningWithLink ? "log-in" : "plus"} className="w-5 h-5" />
                                    {isJoiningWithLink ? "Join Secure Chat" : "Create Secure Room"}
                                </button>
                            </form>
                            {joinError && (
                                <div className="mt-3 text-xs text-rose-300 font-semibold text-center">
                                    {joinError}
                                </div>
                            )}
                        </div>

                        {/* Footer details */}
                        <div className={`text-center text-[10px] ${currentTheme.isLight ? 'text-slate-600' : 'text-gray-500'}`}>
                            Powered by Web Crypto API AES-GCM 256-bit encryption.
                        </div>
                    </div>
                );
            }

            // SCREEN B: SETTINGS SCREEN
            if (showSettings) {
                return (
                    <div className="flex-1 flex flex-col p-6 justify-between overflow-y-auto">
                        <div className="space-y-6">
                            <div className={`flex items-center justify-between border-b ${currentTheme.headerBorder} pb-4 mb-2`}>
                                <h2 className={`text-lg font-bold flex items-center gap-2 ${currentTheme.textAccent}`}>
                                    <Icon name="settings" className="w-5 h-5" /> Settings
                                </h2>
                                {firebaseConfig && (
                                    <button onClick={() => setShowSettings(false)} className={`${currentTheme.isLight ? 'text-slate-600 hover:text-slate-900' : 'text-gray-400 hover:text-white'} p-1`}>
                                        <Icon name="x" className="w-5 h-5" />
                                    </button>
                                )}
                            </div>

                            {/* Theme Customizer Section */}
                            <div className="space-y-3">
                                <label className={`block text-xs font-bold uppercase tracking-wider ${currentTheme.textAccent}`}>Interface Theme</label>
                                <div className="grid grid-cols-2 gap-2.5">
                                    {Object.keys(THEMES).map((key) => (
                                        <button
                                            key={key}
                                            type="button"
                                            onClick={() => {
                                                setThemeKey(key);
                                                localStorage.setItem("GHOST_THEME", key);
                                            }}
                                            className={`p-3 rounded-xl border text-xs font-bold text-left transition-all flex items-center justify-between ${themeKey === key ? 'border-brand-500 bg-brand-500/10 text-white' : (currentTheme.isLight ? 'border-slate-300/70 bg-white/80 text-slate-700 hover:text-slate-900' : 'border-purple-900/10 bg-[#160d31]/20 text-gray-400 hover:text-white')}`}
                                        >
                                            <span>{THEMES[key].name}</span>
                                            <span className={`w-3 h-3 rounded-full ${key === 'orchid' ? 'bg-brand-500' : key === 'cyberpunk' ? 'bg-lime-500' : key === 'obsidian' ? 'bg-zinc-400' : 'bg-sky-500'}`}></span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Connection Selector */}
                            <div className="space-y-3">
                                <label className={`block text-xs font-bold uppercase tracking-wider ${currentTheme.textAccent}`}>Sync Connection</label>
                                <p className={`${currentTheme.isLight ? 'text-slate-600' : 'text-gray-400'} text-[11px] leading-relaxed`}>Firebase syncs messages globally across different devices in real-time.</p>
                            </div>

                            {/* Custom Config Form */}
                            <form onSubmit={saveFirebaseSettings} className="space-y-4">
                                <h3 className={`text-xs font-bold uppercase tracking-wider ${currentTheme.textAccent} border-t ${currentTheme.headerBorder} pt-4`}>Cloud Setup (Firebase Firestore)</h3>
                                <div>
                                    <label className={`block text-[11px] ${currentTheme.isLight ? 'text-slate-600' : 'text-gray-400'} mb-1`}>Firebase Config JSON</label>
                                    <textarea
                                        rows="8"
                                        placeholder='Paste Firebase web app config JSON here, e.g. {"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'
                                        value={inputFirebaseConfigJSON}
                                        onChange={(e) => setInputFirebaseConfigJSON(e.target.value)}
                                        className={`w-full ${currentTheme.inputBg} rounded-xl px-3 py-2 text-[11px] leading-tight ${currentTheme.isLight ? 'text-slate-900 placeholder-slate-500' : 'text-white'} focus:outline-none`}
                                    />
                                </div>
                                <p className={`text-[10px] ${currentTheme.isLight ? 'text-slate-500' : 'text-gray-400'}`}>You can copy this entire config from your Firebase console under Project settings → Your apps.</p>
                                <button 
                                    type="submit"
                                    className={`w-full ${currentTheme.accentBg} text-white rounded-lg py-2.5 text-xs font-bold transition-colors shadow-lg cursor-pointer`}
                                >
                                    Save & Connect Firebase
                                </button>
                            </form>
                        </div>

                        <div className={`${currentTheme.cardBg} p-3 rounded-xl text-center mt-6`}>
                            <span className={`${currentTheme.isLight ? 'text-slate-600' : 'text-xs text-gray-400'}`}>Current Session User ID: </span>
                            <code className={`${currentTheme.isLight ? 'text-slate-900' : 'text-xs font-bold text-gray-200'}`}>{myUserId}</code>
                        </div>
                    </div>
                );
            }

            // SCREEN C: CHAT MAIN BOARD
            return (
                <div className="flex-1 flex flex-col overflow-hidden">
                    
                    {/* Header bar */}
                    <header className={`px-4 py-3 ${currentTheme.headerBg} border-b ${currentTheme.headerBorder} backdrop-blur-md flex items-center justify-between z-10 shrink-0 transition-all`}>
<div className="relative">
                                    <div className={`w-9 h-9 ${currentTheme.cardBg} border-purple-900/10 rounded-full flex items-center justify-center`}>
                                        <Icon name="ghost" className={`w-5 h-5 ${currentTheme.textAccent}`} />
                                    </div>
                                    <span className="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#130b2b] bg-emerald-500"></span>
                                </div>
                                <div>
                                    <h2 className={`${currentTheme.isLight ? 'text-slate-900' : 'text-white'} text-sm font-bold leading-none`}>Ghost Room</h2>
                                    <span className={`text-[10px] ${currentTheme.textAccent} font-semibold tracking-wide uppercase`}>Firebase Cloud</span>
                                    <span className={`text-[10px] ${currentTheme.isLight ? 'text-slate-500' : 'text-gray-400'} block mt-0.5`}>{activeParticipants} / 2 active users</span>
                        </div>

                        <div className="flex items-center gap-1">
                            {/* Copy Invite Link */}
                            {!participantsLocked && (
                                <button 
                                    onClick={copyInviteLink} 
                                    className={`h-8 px-3 rounded-lg flex items-center gap-1 text-xs font-semibold transition-all ${copied ? (currentTheme.isLight ? 'bg-emerald-600/10 text-emerald-700 border border-emerald-200' : 'bg-emerald-600/20 text-emerald-400 border border-emerald-600/30') : (currentTheme.isLight ? 'bg-slate-100/90 text-slate-900 border border-slate-300 hover:bg-slate-200' : 'bg-gray-800/20 text-gray-200 border border-purple-500/10 hover:bg-gray-800/40')}`}
                                >
                                    <Icon name={copied ? "check" : "share-2"} className="w-3.5 h-3.5" />
                                    {copied ? "Copied" : "Share"}
                                </button>
                            )}

                            {/* Sound Toggle */}
                            <button 
                                onClick={() => {
                                    const nextValue = !soundEnabled;
                                    setSoundEnabled(nextValue);
                                    localStorage.setItem("GHOST_SOUND_ENABLED", nextValue.toString());
                                }} 
                                className={`w-8 h-8 rounded-lg ${currentTheme.isLight ? 'hover:bg-slate-200' : 'hover:bg-gray-800/40'} flex items-center justify-center ${soundEnabled ? (currentTheme.isLight ? 'text-slate-600 hover:text-slate-900' : 'text-gray-400 hover:text-white') : 'text-rose-400 hover:text-rose-300'}`}
                                title={soundEnabled ? "Mute sound" : "Unmute sound"}
                            >
                                {soundEnabled ? (
                                    <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                                        <path d="M19.07 4.93a9 9 0 0 1 0 14.14" />
                                    </svg>
                                ) : (
                                    <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                        <line x1="23" y1="9" x2="17" y2="15" />
                                        <line x1="17" y1="9" x2="23" y2="15" />
                                    </svg>
                                )}
                            </button>

                            {/* Settings */}
                            <button 
                                onClick={() => setShowSettings(true)} 
                                className={`w-8 h-8 rounded-lg ${currentTheme.isLight ? 'hover:bg-slate-200' : 'hover:bg-gray-800/40'} flex items-center justify-center ${currentTheme.isLight ? 'text-slate-600 hover:text-slate-900' : 'text-gray-400 hover:text-white'}`}
                            >
                                <Icon name="settings" className="w-4 h-4" />
                            </button>
                        </div>
                    </header>

                    {/* Messages Board */}
                    <main ref={messagesContainerRef} onScroll={handleChatScroll} className="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll">
                        
                        {/* Security Announcement Indicator */}
                        <div className={`${currentTheme.cardBg} ${currentTheme.isLight ? 'border-slate-200/80' : 'border-purple-900/10'} rounded-xl p-3 text-center space-y-1 max-w-sm mx-auto transition-all`}>
                            <span className={`text-[10px] font-bold ${currentTheme.textAccent} uppercase tracking-widest flex items-center justify-center gap-1`}>
                                <Icon name="shield" className="w-3 h-3" /> Cryptography Verified
                            </span>
                            <p className={`${currentTheme.isLight ? 'text-slate-600' : 'text-gray-400'} text-[11px]`}>
                                Messages are encrypted locally on your phone before transit.
                            </p>
                        </div>

                        {messages.length === 0 ? (
                            <div className={`h-4/5 flex flex-col items-center justify-center text-center space-y-3 p-6 ${currentTheme.isLight ? 'text-slate-500' : 'text-gray-500'}`}>
                                <div className={`w-12 h-12 rounded-full border border-dashed ${currentTheme.isLight ? 'border-slate-300' : 'border-gray-800'} flex items-center justify-center`}>
                                    <Icon name="message-square" className={`w-6 h-6 ${currentTheme.isLight ? 'text-slate-700' : 'text-gray-800'}`} />
                                </div>
                                <p className="text-xs">No secure signals detected yet.<br />Send a message to ignite this chat.</p>
                            </div>
                        ) : (
                            messages.map((msg) => {
                                const isSelf = msg.senderId === myUserId;
                                let gifPayload = null;
                                let imagePayload = null;
                                try {
                                    const parsed = JSON.parse(msg.content);
                                    if (parsed?.type === "gif" && parsed?.url) {
                                        gifPayload = parsed;
                                    } else if (parsed?.type === "image" && parsed?.url) {
                                        imagePayload = parsed;
                                    }
                                } catch (err) {
                                    gifPayload = null;
                                    imagePayload = null;
                                }

                                return (
                                    <div 
                                        key={msg.id} 
                                        className={`flex flex-col max-w-[80%] ${isSelf ? 'ml-auto items-end' : 'mr-auto items-start'}`}
                                    >
                                        <div className="flex items-center gap-1.5 mb-1">
                                            <span className={`text-[10px] font-bold ${currentTheme.isLight ? 'text-slate-600' : 'text-gray-400'}`}>
                                                {isSelf ? 'You' : msg.senderName}
                                            </span>
                                            <span className="text-[10px] text-gray-600">
                                                •
                                            </span>
                                            {/* Clock countdown metrics */}
                                            <span className="text-[10px] text-rose-400 font-semibold flex items-center gap-0.5">
                                                <Icon name="hourglass" className="w-2.5 h-2.5" />
                                                {expiringList[msg.id] || "0:00"}
                                            </span>
                                        </div>
                                        <div className={`p-3.5 rounded-2xl text-sm leading-relaxed tracking-wide ${isSelf ? `${currentTheme.messageSelfBg} text-white rounded-tr-none shadow-md` : `${currentTheme.messageOtherBg} rounded-tl-none`}`}>
                                            {gifPayload ? (
                                                <img 
                                                    src={gifPayload.url} 
                                                    alt={gifPayload.title || 'GIF'}
                                                    className="w-full max-w-[18rem] rounded-2xl object-cover"
                                                />
                                            ) : imagePayload ? (
                                                <img
                                                    src={imagePayload.url}
                                                    alt={imagePayload.name || 'Shared image'}
                                                    className="w-full max-w-[18rem] rounded-2xl object-cover"
                                                />
                                            ) : (
                                                msg.content
                                            )}
                                        </div>
                                    </div>
                                );
                            })
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    {/* Adjustable Self Destruct Countdown Panel */}
                    <div className={`px-3 py-1.5 ${currentTheme.isLight ? 'bg-slate-100/80' : 'bg-black/40'} border-t ${currentTheme.headerBorder} flex items-center justify-between gap-2 shrink-0`}>
                        <div className={`flex items-center gap-1 text-[11px] font-bold ${currentTheme.isLight ? 'text-rose-700 bg-rose-200/70 border border-rose-200' : 'text-rose-400 bg-rose-500/5 border border-rose-500/10'} shrink-0 select-none px-2 py-1 rounded-lg`}>
                            <span className="text-[10px]">LIFETIME:</span>
                            <select 
                                value={selfDestructMinutes}
                                onChange={(e) => handleLifetimeChange(Number(e.target.value))}
                                className="bg-transparent text-rose-400 focus:outline-none cursor-pointer border-none font-bold"
                            >
                                <option value="1" className="bg-[#130b2b] text-gray-200">1 Min</option>
                                <option value="5" className="bg-[#130b2b] text-gray-200">5 Mins</option>
                                <option value="15" className="bg-[#130b2b] text-gray-200">15 Mins</option>
                                <option value="30" className="bg-[#130b2b] text-gray-200">30 Mins</option>
                                <option value="60" className="bg-[#130b2b] text-gray-200">1 Hour</option>
                                <option value="1440" className="bg-[#130b2b] text-gray-200">24 Hours</option>
                            </select>
                        </div>
                    </div>

                    {/* Bottom Input Area */}
                    <footer className={`p-3 ${currentTheme.isLight ? 'bg-slate-100/80' : 'bg-black/40'} border-t ${currentTheme.headerBorder} flex items-center gap-2 shrink-0 pb-safe`}>
                        <form onSubmit={sendMessage} className="flex-1 flex items-center gap-2 relative">
                            <input 
                                type="text" 
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                placeholder="Whisper securely..." 
                                className={`flex-1 ${currentTheme.inputBg} rounded-full px-4 py-3.5 ${currentTheme.isLight ? 'text-slate-900 placeholder-slate-500' : 'text-white placeholder-gray-500'} focus:outline-none focus:ring-1 text-sm transition-all`}
                            />
                            
                            <input
                                ref={imageInputRef}
                                type="file"
                                accept="image/*"
                                capture="environment"
                                className="hidden"
                                onChange={handleImageSelect}
                            />
                            <button
                                type="button"
                                disabled={imageSending}
                                onClick={() => imageInputRef.current?.click()}
                                className={`w-11 h-11 ${currentTheme.cardBg} ${imageSending ? 'opacity-70 cursor-not-allowed' : 'active:scale-95'} rounded-full flex items-center justify-center ${currentTheme.isLight ? 'text-slate-900 border border-slate-300 hover:border-slate-400' : 'text-white border border-purple-900/20 hover:border-purple-500/40'} transition-all shadow-md`}
                                title={imageSending ? "Uploading image..." : "Attach image"}
                            >
                                {imageSending ? (
                                    <svg viewBox="0 0 24 24" className="w-4 h-4 animate-spin text-current" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="12" cy="12" r="10" strokeOpacity="0.25" />
                                        <path d="M22 12a10 10 0 0 1-10 10" />
                                    </svg>
                                ) : (
                                    <Icon name="paperclip" className="w-4 h-4" />
                                )}
                            </button>
                            <button 
                                type="button"
                                onClick={() => setShowGifPicker((prev) => !prev)}
                                className={`w-11 h-11 ${currentTheme.cardBg} active:scale-95 rounded-full flex items-center justify-center ${currentTheme.isLight ? 'text-slate-900 border border-slate-300 hover:border-slate-400' : 'text-white border border-purple-900/20 hover:border-purple-500/40'} transition-all shadow-md`}
                                title="Search GIFs"
                            >
                                <Icon name="image" className="w-4 h-4" />
                            </button>
                            <button 
                                type="submit"
                                className={`w-11 h-11 ${currentTheme.accentBg} active:scale-95 rounded-full flex items-center justify-center text-white transition-all shadow-md cursor-pointer`}
                            >
                                <Icon name="send" className="w-4 h-4 ml-0.5" />
                            </button>
                        </form>
                    </footer>

                    {showGifPicker && (
                        <div className={`px-3 pb-3 ${currentTheme.isLight ? 'bg-slate-100/90' : 'bg-black/70'} border-t ${currentTheme.headerBorder} space-y-3`}>
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={gifSearchTerm}
                                    onChange={(e) => setGifSearchTerm(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); searchGifs(gifSearchTerm); } }}
                                    placeholder="Search GIFs with Tenor or Giphy..."
                                    className={`flex-1 ${currentTheme.inputBg} rounded-xl px-4 py-3.5 ${currentTheme.isLight ? 'text-slate-900 placeholder-slate-500' : 'text-white placeholder-gray-500'} focus:outline-none focus:ring-1 text-sm transition-all`}
                                />
                                <button
                                    type="button"
                                    onClick={() => searchGifs(gifSearchTerm)}
                                    className={`w-28 ${currentTheme.accentBg} rounded-xl text-sm font-bold text-white transition-all shadow-md ${currentTheme.isLight ? 'shadow-slate-300/40' : ''}`}
                                >
                                    {gifLoading ? 'Searching...' : 'Search'}
                                </button>
                            </div>
                            <div className={`flex items-center gap-2 text-[11px] ${currentTheme.isLight ? 'text-slate-600' : 'text-gray-400'}`}>
                                <span className={`uppercase tracking-[0.2em] font-semibold ${currentTheme.isLight ? 'text-slate-500' : 'text-gray-300'}`}>Source</span>
                                {['tenor', 'giphy'].map((provider) => (
                                    <button
                                        key={provider}
                                        type="button"
                                        onClick={() => setGifProvider(provider)}
                                        className={`px-3 py-2 rounded-xl text-xs font-semibold transition-all ${gifProvider === provider ? 'bg-brand-600 text-white' : (currentTheme.isLight ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'bg-white/5 text-gray-300 hover:bg-white/10')}`}
                                    >
                                        {provider === 'tenor' ? 'Tenor' : 'Giphy'}
                                    </button>
                                ))}
                                <span className={`${currentTheme.isLight ? 'text-slate-600' : 'text-gray-500'}`}>Click a GIF to send instantly.</span>
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                                {gifResults.length > 0 ? gifResults.map((gif) => (
                                    <button
                                        key={gif.id}
                                        type="button"
                                        onClick={() => sendGif(gif.url)}
                                        className={`overflow-hidden rounded-2xl ${currentTheme.isLight ? 'bg-slate-100 border border-slate-200' : 'bg-[#110a28] border border-purple-900/30'}`}
                                    >
                                        <img src={gif.preview} alt={gif.title || 'GIF preview'} className="w-full h-24 object-cover" />
                                    </button>
                                )) : (
                                    <div className={`${currentTheme.isLight ? 'col-span-3 text-slate-600 leading-relaxed p-4 rounded-2xl border border-slate-200 bg-white/90 text-center' : 'col-span-3 text-[11px] text-gray-400 leading-relaxed p-4 rounded-2xl border border-purple-900/20 bg-[#09070f]/90 text-center'}`}>
                                        {gifLoading ? 'Loading GIFs…' : 'Enter a search term and press Search to browse GIFs.'}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Mount React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GhostChatApp />);
    </script>
</body>
</html>
