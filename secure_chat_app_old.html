<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GhostChat - Secure Ephemeral 1-on-1 Chat</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons (SVG library) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React and Babel (for running ES6/JSX directly in single file) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Register a custom preset to force classic JSX compilation (using React.createElement instead of ES imports)
        Babel.registerPreset("react-classic", {
            presets: [
                [Babel.availablePresets["react"], { runtime: "classic" }]
            ]
        });
    </script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* Custom viewport fix for iOS/Android address bars */
        body {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background-color: #0f0720;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Smooth scrolling custom scrollbar */
        .chat-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .chat-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 999px;
        }

        /* Particle fade out animation for self-destructing messages */
        @keyframes vanish {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }

            100% {
                opacity: 0;
                transform: scale(0.85);
                filter: blur(12px);
            }
        }

        .vanishing {
            animation: vanish 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>

<body class="text-gray-100 flex items-center justify-center">

    <!-- React Root Mount Node -->
    <div id="root"
        class="w-full h-full max-w-md bg-[#130b2b] md:rounded-2xl md:shadow-2xl md:border md:border-purple-950/50 md:h-[90vh] md:max-h-[850px] relative overflow-hidden flex flex-col">
    </div>

    <!-- Apply custom 'react-classic' preset to compile JSX correctly on standard browser runtime -->
    <script type="text/babel" data-presets="env,react-classic">
        const { useState, useEffect, useRef } = React;

        // =========================================================================
        // 1. CRYPTO HELPERS (Client-side end-to-end AES-GCM encryption)
        // =========================================================================
        function bufferToBase64(buf) {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
        }

        function base64ToBuffer(base64) {
            const binstr = atob(base64);
            const buf = new Uint8Array(binstr.length);
            for (let i = 0; i < binstr.length; i++) {
                buf[i] = binstr.charCodeAt(i);
            }
            return buf.buffer;
        }

        async function generateCryptoKey() {
            return await window.crypto.subtle.generateKey(
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function exportKeyToBase64(key) {
            const exported = await window.crypto.subtle.exportKey("jwk", key);
            return btoa(JSON.stringify(exported))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        async function importKeyFromBase64(base64Url) {
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) {
                base64 += '=';
            }
            const jwk = JSON.parse(atob(base64));
            return await window.crypto.subtle.importKey(
                "jwk",
                jwk,
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptText(text, key) {
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encoder = new TextEncoder();
            const ciphertext = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                key,
                encoder.encode(text)
            );
            return {
                ciphertext: bufferToBase64(ciphertext),
                iv: bufferToBase64(iv)
            };
        }

        async function decryptText(ciphertextBase64, ivBase64, key) {
            try {
                const ciphertext = base64ToBuffer(ciphertextBase64);
                const iv = base64ToBuffer(ivBase64);
                const decoder = new TextDecoder();
                const decrypted = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    ciphertext
                );
                return decoder.decode(decrypted);
            } catch (e) {
                return "[Error Decrypting Message - Invalid Key]";
            }
        }

        // =========================================================================
        // 2. AUDIO FEEDBACK (Synthesizer-based futuristic "Ding" to prevent massive audio blobs)
        // =========================================================================
        function playNotificationSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();

                // Sound 1: Bright trigger chime
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc1.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12); // Up to A5
                gain1.gain.setValueAtTime(0.08, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);

                osc1.start();
                osc1.stop(ctx.currentTime + 0.25);
            } catch (err) {
                console.warn("Audio Context blocked by browser interaction rules", err);
            }
        }

        // =========================================================================
        // MAIN REACT COMPONENT
        // =========================================================================
        function GhostChatApp() {
            // App Navigation / Room Setup States
            const [roomID, setRoomID] = useState("");
            const [cryptoKey, setCryptoKey] = useState(null);
            const [username, setUsername] = useState("");
            const [isCreated, setIsCreated] = useState(false);
            const [myUserId] = useState(() => Math.random().toString(36).substring(2, 9));
            const [inviteLink, setInviteLink] = useState("");

            // Connection & Config States
            const [connectionMode, setConnectionMode] = useState("demo"); // 'demo' (BroadcastChannel) or 'firebase'
            const [firebaseConfig, setFirebaseConfig] = useState(() => {
                const firebaseConfig = {
                    apiKey: "AIzaSyBLa6OqX1IXw0ePVOT1Q0_xbl_XwthHvgg",
                    authDomain: "ghost-messenger-7af0c.firebaseapp.com",
                    projectId: "ghost-messenger-7af0c",
                    storageBucket: "ghost-messenger-7af0c.firebasestorage.app",
                    messagingSenderId: "1034494171642",
                    appId: "1:1034494171642:web:ecc8a296d61c21cd6eec43",
                    measurementId: "G-MDJG2JBVTH"
                };;
                return firebaseConfig;
            });
            const [showSettings, setShowSettings] = useState(false);

            // Live Chat States
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState("");
            const [selfDestructMinutes, setSelfDestructMinutes] = useState(1); // Default 1 minute
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [showEmojiPicker, setShowEmojiPicker] = useState(false);
            const [copied, setCopied] = useState(false);
            const [expiringList, setExpiringList] = useState({}); // Ticking visual metadata

            // UI System State
            const [inputApiKey, setInputApiKey] = useState("");
            const [inputProjectId, setInputProjectId] = useState("");

            // Refs
            const messagesEndRef = useRef(null);
            const broadcastChannelRef = useRef(null);
            const firebaseUnsubscribeRef = useRef(null);

            // Quick emoji collection
            const popularEmojis = ["😂", "👍", "🔥", "❤️", "😍", "🙌", "🎉", "😢", "😮", "🤔", "👀", "🤐", "👻"];

            // -------------------------------------------------------------------------
            // Initial Mount: Parse URL for existing Room & Key
            // -------------------------------------------------------------------------
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlRoomId = params.get("room");
                const urlHash = window.location.hash;

                if (urlRoomId && urlHash.startsWith("#key=")) {
                    const keyString = urlHash.substring(5);
                    setRoomID(urlRoomId);
                    importKeyFromBase64(keyString).then(key => {
                        setCryptoKey(key);
                        setIsCreated(true);
                        setInviteLink(window.location.href);
                    });
                }
            }, []);

            // -------------------------------------------------------------------------
            // Real-Time DB Sync & Listeners (Demo Channel or Firebase)
            // -------------------------------------------------------------------------
            useEffect(() => {
                if (!isCreated || !roomID || !cryptoKey) return;

                // Cleanup previous active listener
                if (broadcastChannelRef.current) broadcastChannelRef.current.close();
                if (firebaseUnsubscribeRef.current) firebaseUnsubscribeRef.current();

                if (connectionMode === "demo") {
                    // DEMO MODE: syncs between tabs in same browser
                    const channel = new BroadcastChannel(`room-${roomID}`);
                    broadcastChannelRef.current = channel;

                    channel.onmessage = async (event) => {
                        const { encrypted, senderId, senderName, createdAt, expiresAt } = event.data;
                        const decryptedText = await decryptText(encrypted.ciphertext, encrypted.iv, cryptoKey);

                        const newMsg = {
                            id: Math.random().toString(36).substring(2, 9),
                            content: decryptedText,
                            senderId,
                            senderName,
                            createdAt: createdAt || Date.now(),
                            expiresAt: expiresAt || (Date.now() + selfDestructMinutes * 60000)
                        };

                        setMessages(prev => {
                            // Deduplicate demo messages
                            if (prev.some(m => m.id === newMsg.id)) return prev;
                            return [...prev, newMsg];
                        });

                        if (senderId !== myUserId && soundEnabled) {
                            playNotificationSound();
                        }
                    };
                } else if (connectionMode === "firebase" && firebaseConfig) {
                    // FIREBASE MODE: Full internet real-time communication
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        const db = firebase.firestore();

                        const unsubscribe = db.collection("rooms")
                            .doc(roomID)
                            .collection("messages")
                            .orderBy("createdAt", "asc")
                            .onSnapshot(async (snapshot) => {
                                const fetchedMsgs = [];
                                for (const doc of snapshot.docs) {
                                    const data = doc.data();
                                    // Check self destruct on pull
                                    if (data.expiresAt && data.expiresAt < Date.now()) {
                                        // Delete from Firebase
                                        db.collection("rooms").doc(roomID).collection("messages").doc(doc.id).delete();
                                        continue;
                                    }

                                    const decryptedText = await decryptText(data.ciphertext, data.iv, cryptoKey);
                                    fetchedMsgs.push({
                                        id: doc.id,
                                        content: decryptedText,
                                        senderId: data.senderId,
                                        senderName: data.senderName,
                                        createdAt: data.createdAt?.seconds ? data.createdAt.seconds * 1000 : Date.now(),
                                        expiresAt: data.expiresAt
                                    });
                                }

                                setMessages(prev => {
                                    // Detect if a new incoming message arrived from peer for notification sound
                                    if (fetchedMsgs.length > prev.length) {
                                        const lastMsg = fetchedMsgs[fetchedMsgs.length - 1];
                                        if (lastMsg && lastMsg.senderId !== myUserId && soundEnabled) {
                                            playNotificationSound();
                                        }
                                    }
                                    return fetchedMsgs;
                                });
                            }, (error) => {
                                console.error("Firestore Listen Error: ", error);
                            });

                        firebaseUnsubscribeRef.current = unsubscribe;
                    } catch (e) {
                        console.error("Firebase startup crashed: ", e);
                        alert("Firebase configuration failed to load. Falling back to Demo mode.");
                        setConnectionMode("demo");
                    }
                }

                return () => {
                    if (broadcastChannelRef.current) broadcastChannelRef.current.close();
                    if (firebaseUnsubscribeRef.current) firebaseUnsubscribeRef.current();
                };
            }, [isCreated, roomID, cryptoKey, connectionMode, firebaseConfig]);

            // -------------------------------------------------------------------------
            // Auto-scroll on new message
            // -------------------------------------------------------------------------
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // -------------------------------------------------------------------------
            // Self-Destruct Timer Loops (Ticks every second to fade-out messages)
            // -------------------------------------------------------------------------
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = Date.now();
                    const nextExpirations = {};
                    let stateChanged = false;

                    messages.forEach(msg => {
                        const remainingMs = msg.expiresAt - now;
                        if (remainingMs <= 0) {
                            // Triggers local visual state removal
                            stateChanged = true;
                            // If using Firebase, delete remotely
                            if (connectionMode === "firebase" && firebaseConfig) {
                                firebase.firestore().collection("rooms").doc(roomID).collection("messages").doc(msg.id).delete();
                            }
                        } else {
                            const secs = Math.ceil(remainingMs / 1000);
                            const minPart = Math.floor(secs / 60);
                            const secPart = secs % 60;
                            nextExpirations[msg.id] = `${minPart}:${secPart.toString().padStart(2, '0')}`;
                        }
                    });

                    setExpiringList(nextExpirations);

                    if (stateChanged) {
                        setMessages(prev => prev.filter(msg => msg.expiresAt > now));
                    }
                }, 1000);

                return () => clearInterval(interval);
            }, [messages, connectionMode, firebaseConfig]);

            // -------------------------------------------------------------------------
            // Room Generator Init
            // -------------------------------------------------------------------------
            const handleCreateRoom = async (e) => {
                e.preventDefault();
                if (!username.trim()) return;

                const newRoomId = Math.random().toString(36).substring(2, 10);
                const secureKey = await generateCryptoKey();
                const keyBase64 = await exportKeyToBase64(secureKey);

                // Build complete cryptographic secure link with key on the URL Hash
                let cleanBaseUrl = window.location.href.split('#')[0].split('?')[0];
                if (cleanBaseUrl.startsWith('blob:')) {
                    cleanBaseUrl = cleanBaseUrl.replace(/^blob:/, '');
                }
                const secureInviteLink = `${cleanBaseUrl}?room=${newRoomId}#key=${keyBase64}`;

                setInviteLink(secureInviteLink);
                setRoomID(newRoomId);
                setCryptoKey(secureKey);
                setIsCreated(true);

                // Safely update the history address bar (and handle security sandbox restrictions gracefully)
                try {
                    window.history.replaceState(null, "", secureInviteLink);
                } catch (historyError) {
                    console.warn(
                        "Security sandbox restricted browser history rewriting. " +
                        "This is normal for iframe previews. The invite link has been generated locally & can still be copied via the Share button!",
                        historyError
                    );
                }
            };

            // -------------------------------------------------------------------------
            // Copy Link Helper
            // -------------------------------------------------------------------------
            const copyInviteLink = () => {
                const dummy = document.createElement("input");
                document.body.appendChild(dummy);
                // Always pull from the state value as a backup if the URL bar couldn't be updated
                dummy.value = inviteLink || window.location.href;
                dummy.select();
                document.execCommand("copy");
                document.body.removeChild(dummy);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            // -------------------------------------------------------------------------
            // Send Message logic
            // -------------------------------------------------------------------------
            const sendMessage = async (e) => {
                if (e) e.preventDefault();
                if (!inputText.trim()) return;

                const textToSend = inputText.trim();
                setInputText("");
                setShowEmojiPicker(false);

                const encrypted = await encryptText(textToSend, cryptoKey);
                const expiryTime = Date.now() + (selfDestructMinutes * 60 * 1000);

                if (connectionMode === "demo") {
                    const localMsgId = Math.random().toString(36).substring(2, 9);
                    const localMsg = {
                        id: localMsgId,
                        content: textToSend,
                        senderId: myUserId,
                        senderName: username || "Guest",
                        createdAt: Date.now(),
                        expiresAt: expiryTime
                    };

                    setMessages(prev => [...prev, localMsg]);

                    // Send to other open tabs
                    if (broadcastChannelRef.current) {
                        broadcastChannelRef.current.postMessage({
                            encrypted,
                            senderId: myUserId,
                            senderName: username || "Guest",
                            createdAt: Date.now(),
                            expiresAt: expiryTime
                        });
                    }
                } else if (connectionMode === "firebase" && firebaseConfig) {
                    try {
                        const db = firebase.firestore();
                        await db.collection("rooms").doc(roomID).collection("messages").add({
                            ciphertext: encrypted.ciphertext,
                            iv: encrypted.iv,
                            senderId: myUserId,
                            senderName: username || "Guest",
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            expiresAt: expiryTime
                        });
                    } catch (err) {
                        console.error("Firebase write error: ", err);
                        alert("Failed to send message. Please verify your Firebase Firestore configuration rules.");
                    }
                }
            };

            const appendEmoji = (emoji) => {
                setInputText(prev => prev + emoji);
            };

            // -------------------------------------------------------------------------
            // Firebase Config Setup
            // -------------------------------------------------------------------------
            const saveFirebaseSettings = (e) => {
                e.preventDefault();
                if (!inputApiKey || !inputProjectId) {
                    alert("Please fill in key details.");
                    return;
                }

                // Autogenerate basic Firebase Config structure
                const conf = {
                    apiKey: inputApiKey,
                    authDomain: `${inputProjectId}.firebaseapp.com`,
                    projectId: inputProjectId,
                    storageBucket: `${inputProjectId}.appspot.com`,
                    messagingSenderId: "1234567890",
                    appId: `1:${Math.floor(Math.random() * 1000000000)}:web:${Math.random().toString(36).substring(2, 10)}`
                };

                localStorage.setItem("GHOST_FIREBASE_CONFIG", JSON.stringify(conf));
                setFirebaseConfig(conf);
                setConnectionMode("firebase");
                setShowSettings(false);
            };

            // Initialize Lucide Icons after React rendering cycle
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isCreated, showSettings, showEmojiPicker, connectionMode, copied, soundEnabled]);

            // =========================================================================
            // RENDERING PHASE
            // =========================================================================

            // SCREEN A: LANDING PAGE / ROOM CREATION / JOIN REQUEST
            if (!isCreated) {
                return (
                    <div className="flex-1 flex flex-col justify-between p-6">
                        {/* Header Branding */}
                        <div className="text-center mt-6">
                            <div className="mx-auto w-16 h-16 bg-gradient-to-tr from-brand-500 to-violet-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/30 mb-4">
                                <i data-lucide="shield-alert" className="w-8 h-8 text-white"></i>
                            </div>
                            <h1 className="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-purple-200 to-brand-500 bg-clip-text text-transparent">GhostChat</h1>
                            <p className="text-xs text-purple-300 mt-2 tracking-wide uppercase font-semibold">Zero accounts. Total Privacy.</p>
                        </div>

                        {/* Setup Body */}
                        <div className="my-auto space-y-5">
                            <div className="bg-purple-950/20 border border-purple-900/40 p-4 rounded-xl space-y-3">
                                <h3 className="text-sm font-semibold text-purple-300 flex items-center gap-2">
                                    <i data-lucide="lock" className="w-4 h-4 text-brand-500"></i> End-To-End Encrypted
                                </h3>
                                <p className="text-xs text-gray-400 leading-relaxed">
                                    A cryptographic key is generated inside your browser and appended to the URL hash. Because hash data stays client-side, <span className="text-purple-300 font-semibold">no server can ever read your messages</span>.
                                </p>
                            </div>

                            <form onSubmit={handleCreateRoom} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold uppercase tracking-wider text-purple-300 mb-2">Your Display Name</label>
                                    <input
                                        type="text"
                                        required
                                        maxLength="12"
                                        placeholder="e.g. Alice"
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        className="w-full bg-[#1b0e3b] border border-purple-900/60 rounded-xl px-4 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all text-sm font-medium"
                                    />
                                </div>

                                <button
                                    type="submit"
                                    className="w-full bg-brand-600 hover:bg-brand-700 active:transform active:scale-98 text-white rounded-xl py-4 font-bold text-sm tracking-wide shadow-lg shadow-brand-600/30 transition-all flex items-center justify-center gap-2 cursor-pointer"
                                >
                                    <i data-lucide="plus" className="w-5 h-5"></i> Create Secure Room
                                </button>
                            </form>
                        </div>

                        {/* Footer details */}
                        <div className="text-center text-[10px] text-gray-500">
                            Powered by Web Crypto API AES-GCM 256-bit encryption.
                        </div>
                    </div>
                );
            }

            // SCREEN B: SETTINGS SCREEN
            if (showSettings) {
                return (
                    <div className="flex-1 flex flex-col p-6 justify-between">
                        <div>
                            <div className="flex items-center justify-between border-b border-purple-950 pb-4 mb-6">
                                <h2 className="text-lg font-bold flex items-center gap-2 text-purple-300">
                                    <i data-lucide="settings" className="w-5 h-5 text-brand-500"></i> Settings
                                </h2>
                                <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-white p-1">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>

                            {/* Connection Selector */}
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold uppercase tracking-wider text-purple-300 mb-2">Sync Connection Mode</label>
                                    <div className="grid grid-cols-2 gap-3 bg-[#1b0e3b] p-1 rounded-xl">
                                        <button
                                            type="button"
                                            onClick={() => setConnectionMode("demo")}
                                            className={`py-2.5 rounded-lg text-xs font-bold transition-all ${connectionMode === "demo" ? 'bg-brand-600 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}
                                        >
                                            Demo (Tabs)
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                if (!firebaseConfig) {
                                                    alert("Please configure your Firebase credentials below first!");
                                                    return;
                                                }
                                                setConnectionMode("firebase");
                                            }}
                                            className={`py-2.5 rounded-lg text-xs font-bold transition-all ${connectionMode === "firebase" ? 'bg-brand-600 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}
                                        >
                                            Cloud (Firebase)
                                        </button>
                                    </div>
                                    <p className="text-[11px] text-gray-400 mt-2 leading-relaxed">
                                        {connectionMode === "demo"
                                            ? "Demo Mode allows you to open this URL in another tab of this device to test instantly."
                                            : "Firebase syncs messages globally across different devices in real-time."}
                                    </p>
                                </div>

                                {/* Custom Config Form */}
                                <form onSubmit={saveFirebaseSettings} className="space-y-4">
                                    <h3 className="text-xs font-bold uppercase tracking-wider text-purple-300 border-t border-purple-950 pt-4">Cloud Setup (Firebase Firestore)</h3>
                                    <div>
                                        <label className="block text-[11px] text-gray-400 mb-1">Firebase API Key</label>
                                        <input
                                            type="password"
                                            placeholder="AIzaSy..."
                                            value={inputApiKey}
                                            onChange={(e) => setInputApiKey(e.target.value)}
                                            className="w-full bg-[#1b0e3b] border border-purple-900/60 rounded-xl px-3 py-2 text-xs text-white"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] text-gray-400 mb-1">Firebase Project ID</label>
                                        <input
                                            type="text"
                                            placeholder="my-ghost-chat"
                                            value={inputProjectId}
                                            onChange={(e) => setInputProjectId(e.target.value)}
                                            className="w-full bg-[#1b0e3b] border border-purple-900/60 rounded-xl px-3 py-2 text-xs text-white"
                                        />
                                    </div>
                                    <button
                                        type="submit"
                                        className="w-full bg-brand-600 hover:bg-brand-700 text-white rounded-lg py-2.5 text-xs font-bold transition-colors shadow-lg shadow-brand-600/10 cursor-pointer"
                                    >
                                        Save & Connect Firebase
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div className="bg-purple-950/20 border border-purple-900/40 p-4 rounded-xl text-center">
                            <span className="text-xs text-gray-400">Current Session User ID: </span>
                            <code className="text-xs font-bold text-brand-100">{myUserId}</code>
                        </div>
                    </div>
                );
            }

            // SCREEN C: CHAT MAIN BOARD
            return (
                <div className="flex-1 flex flex-col overflow-hidden">

                    {/* Header bar */}
                    <header className="px-4 py-3 bg-[#110928]/80 border-b border-purple-950/40 backdrop-blur-md flex items-center justify-between z-10 shrink-0">
                        <div className="flex items-center gap-2.5">
                            <div className="relative">
                                <div className="w-9 h-9 bg-brand-900 rounded-full flex items-center justify-center">
                                    <i data-lucide="ghost" className="w-5 h-5 text-brand-500"></i>
                                </div>
                                <span className={`absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#130b2b] ${connectionMode === "firebase" ? 'bg-emerald-500' : 'bg-amber-500'}`}></span>
                            </div>
                            <div>
                                <h2 className="text-sm font-bold text-white leading-none">Ghost Room</h2>
                                <span className="text-[10px] text-purple-300 font-semibold tracking-wide uppercase">
                                    {connectionMode === "firebase" ? 'Firebase Cloud' : 'Local Demo Channel'}
                                </span>
                            </div>
                        </div>

                        <div className="flex items-center gap-1">
                            {/* Copy Invite Link */}
                            <button
                                onClick={copyInviteLink}
                                className={`h-8 px-3 rounded-lg flex items-center gap-1 text-xs font-semibold transition-all ${copied ? 'bg-emerald-600/20 text-emerald-400 border border-emerald-600/30' : 'bg-brand-900/30 text-brand-100 border border-brand-500/20'}`}
                            >
                                <i data-lucide={copied ? "check" : "share-2"} className="w-3.5 h-3.5"></i>
                                {copied ? "Copied" : "Share"}
                            </button>

                            {/* Sound Toggle */}
                            <button
                                onClick={() => setSoundEnabled(!soundEnabled)}
                                className="w-8 h-8 rounded-lg bg-purple-950/40 hover:bg-purple-900/40 flex items-center justify-center text-gray-400 hover:text-white"
                                title="Toggle Sound"
                            >
                                <i data-lucide={soundEnabled ? "volume-2" : "volume-x"} className="w-4 h-4"></i>
                            </button>

                            {/* Settings */}
                            <button
                                onClick={() => setShowSettings(true)}
                                className="w-8 h-8 rounded-lg bg-purple-950/40 hover:bg-purple-900/40 flex items-center justify-center text-gray-400 hover:text-white"
                            >
                                <i data-lucide="settings" className="w-4 h-4"></i>
                            </button>
                        </div>
                    </header>

                    {/* Messages Board */}
                    <main className="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll bg-gradient-to-b from-[#130b2b] to-[#0a0517]">

                        {/* Security Announcement Indicator */}
                        <div className="bg-purple-950/10 border border-purple-900/30 rounded-xl p-3 text-center space-y-1 max-w-sm mx-auto">
                            <span className="text-[10px] font-bold text-brand-500 uppercase tracking-widest flex items-center justify-center gap-1">
                                <i data-lucide="shield" className="w-3 h-3"></i> Cryptography Verified
                            </span>
                            <p className="text-[11px] text-gray-400">
                                Messages are encrypted locally on your phone before transit.
                            </p>
                        </div>

                        {messages.length === 0 ? (
                            <div className="h-4/5 flex flex-col items-center justify-center text-center space-y-3 p-6 text-gray-500">
                                <div className="w-12 h-12 rounded-full border border-dashed border-purple-900/50 flex items-center justify-center">
                                    <i data-lucide="message-square" className="w-6 h-6 text-purple-950"></i>
                                </div>
                                <p className="text-xs">No secure signals detected yet.<br />Send a message to ignite this chat.</p>
                            </div>
                        ) : (
                            messages.map((msg) => {
                                const isSelf = msg.senderId === myUserId;
                                return (
                                    <div
                                        key={msg.id}
                                        className={`flex flex-col max-w-[80%] ${isSelf ? 'ml-auto items-end' : 'mr-auto items-start'}`}
                                    >
                                        <div className="flex items-center gap-1.5 mb-1">
                                            <span className="text-[10px] font-bold text-purple-300/80">
                                                {isSelf ? 'You' : msg.senderName}
                                            </span>
                                            <span className="text-[10px] text-gray-500">
                                                •
                                            </span>
                                            {/* Beautiful ticking ticking visual */}
                                            <span className="text-[10px] text-rose-400 font-semibold flex items-center gap-0.5">
                                                <i data-lucide="hourglass" className="w-2.5 h-2.5"></i>
                                                {expiringList[msg.id] || "0:00"}
                                            </span>
                                        </div>
                                        <div className={`p-3.5 rounded-2xl text-sm leading-relaxed tracking-wide ${isSelf ? 'bg-gradient-to-tr from-brand-600 to-violet-600 text-white rounded-tr-none' : 'bg-purple-950/40 text-brand-50 border border-purple-900/30 rounded-tl-none'}`}>
                                            {msg.content}
                                        </div>
                                    </div>
                                );
                            })
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    {/* Quick Reactions Deck */}
                    <div className="px-3 py-1.5 bg-[#0e0721]/90 border-t border-purple-950/20 flex items-center justify-between overflow-x-auto gap-2 shrink-0">
                        <div className="flex gap-2">
                            {popularEmojis.map(emoji => (
                                <button
                                    key={emoji}
                                    onClick={() => appendEmoji(emoji)}
                                    className="hover:scale-125 transition-transform duration-100 py-1 px-1.5 text-base"
                                >
                                    {emoji}
                                </button>
                            ))}
                        </div>

                        {/* Adjustable Self Destruct Countdown Panel */}
                        <div className="flex items-center gap-1 text-[11px] font-bold text-rose-400 shrink-0 select-none bg-rose-500/5 px-2 py-1 rounded-lg border border-rose-500/10">
                            <span className="text-[10px]">LIFETIME:</span>
                            <select
                                value={selfDestructMinutes}
                                onChange={(e) => setSelfDestructMinutes(Number(e.target.value))}
                                className="bg-transparent text-rose-400 focus:outline-none cursor-pointer border-none font-bold"
                            >
                                <option value="1" className="bg-[#130b2b] text-gray-200">1 Min</option>
                                <option value="5" className="bg-[#130b2b] text-gray-200">5 Mins</option>
                                <option value="15" className="bg-[#130b2b] text-gray-200">15 Mins</option>
                                <option value="60" className="bg-[#130b2b] text-gray-200">1 Hour</option>
                            </select>
                        </div>
                    </div>

                    {/* Bottom Input Area */}
                    <footer className="p-3 bg-[#0d0720] border-t border-purple-950/40 flex items-center gap-2 shrink-0 pb-safe">
                        <form onSubmit={sendMessage} className="flex-1 flex items-center gap-2 relative">
                            <input
                                type="text"
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                placeholder="Whisper securely..."
                                className="flex-1 bg-[#160d31] border border-purple-900/40 rounded-full px-4 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-brand-500 text-sm"
                            />

                            <button
                                type="submit"
                                className="w-11 h-11 bg-brand-600 active:scale-95 rounded-full flex items-center justify-center hover:bg-brand-700 text-white transition-all shadow-md shadow-brand-600/20 cursor-pointer"
                            >
                                <i data-lucide="send" className="w-4 h-4 ml-0.5"></i>
                            </button>
                        </form>
                    </footer>
                </div>
            );
        }

        // Mount React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GhostChatApp />);
    </script>
</body>

</html>
